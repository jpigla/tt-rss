worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
	include /etc/nginx/mime.types;
	default_type  application/octet-stream;

	access_log /dev/stdout;
	error_log /dev/stderr warn;

	# Versionsnummer aus Server-Header entfernen (Security)
	server_tokens off;

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	keepalive_requests 1000;

	# Gzip-Komprimierung
	gzip on;
	gzip_comp_level 5;
	gzip_types
		text/plain
		text/css
		application/json
		application/javascript
		text/xml
		application/xml
		application/xml+rss
		text/javascript
		image/svg+xml
		font/woff2;
	gzip_min_length 1024;
	gzip_proxied any;
	gzip_vary on;
	gzip_disable "msie6";

	index index.php;

	# Rate-Limiting: API- und Login-Endpunkte schützen
	limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
	limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

	resolver ${RESOLVER} valid=5s;

	# Puffer-Einstellungen für bessere Performance
	client_max_body_size 16M;
	client_body_buffer_size 128k;
	fastcgi_buffers 16 16k;
	fastcgi_buffer_size 32k;
	fastcgi_read_timeout 60s;

	server {
		listen 80;
		listen [::]:80;
		root ${APP_WEB_ROOT};

		# ── Sicherheits-Header ──────────────────────────────────
		add_header X-Content-Type-Options    "nosniff"          always;
		add_header X-Frame-Options           "SAMEORIGIN"       always;
		add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
		add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
		add_header Cross-Origin-Opener-Policy "same-origin" always;

		# ── Statische Assets: Cache-Header ──────────────────────
		location ~* \.(css|js|woff2?|ttf|eot|otf|svg|png|gif|jpg|jpeg|ico|webp)$ {
			expires 30d;
			add_header Cache-Control "public, immutable";
			add_header X-Content-Type-Options "nosniff" always;
			access_log off;
			try_files $uri =404;
		}

		# Webmanifest und Service-Worker: kurzes Caching
		location ~* \.(webmanifest|json)$ {
			expires 1d;
			add_header Cache-Control "public";
			add_header X-Content-Type-Options "nosniff" always;
			try_files $uri =404;
		}

		location = /tt-rss/sw.js {
			expires off;
			add_header Cache-Control "no-cache, no-store, must-revalidate";
			add_header Pragma "no-cache";
			try_files $uri =404;
		}

		location ${APP_BASE}/cache {
			aio threads;
			internal;
		}

		location ${APP_BASE}/backups {
			internal;
		}

		rewrite ${APP_BASE}/healthz ${APP_BASE}/public.php?op=healthcheck;

		# ── Sensible Dateien blockieren ────────────────────────
		location ~* /\.(env|git|svn|htaccess|htpasswd|DS_Store)$ {
			deny all;
			return 404;
		}

		location ~* /(composer\.(json|lock)|package(-lock)?\.json|phpstan\.neon|\.editorconfig|CLAUDE\.md|backup\.sql)$ {
			deny all;
			return 404;
		}

		# API-Endpunkt: Rate-Limiting
		location = ${APP_BASE}/api/ {
			limit_req zone=api burst=20 nodelay;
			try_files $uri $uri/ @php;
		}

		# Regular PHP handling (without PATH_INFO)
		location ~ \.php$ {
			# regex to split $uri to $fastcgi_script_name and $fastcgi_path
			fastcgi_split_path_info ^(.+?\.php)(/.*)$;

			# Check that the PHP script exists before passing it
			try_files $fastcgi_script_name =404;

			fastcgi_index index.php;
			include fastcgi.conf;

			set $backend "${APP_UPSTREAM}:9000";

			fastcgi_pass ${APP_FASTCGI_PASS};
		}

		# Allow PATH_INFO for PHP files in plugins.local directories with an /api/ sub directory to allow plugins to leverage when desired
		location ~ /plugins\.local/.*/api/.*\.php(/|$) {
			# regex to split $uri to $fastcgi_script_name and $fastcgi_path
			fastcgi_split_path_info ^(.+?\.php)(/.*)$;

			# Check that the PHP script exists before passing it
			try_files $fastcgi_script_name =404;

			# Bypass the fact that try_files resets $fastcgi_path_info
			# see: http://trac.nginx.org/nginx/ticket/321
			set $path_info $fastcgi_path_info;
			fastcgi_param PATH_INFO $path_info;

			fastcgi_index index.php;
			include fastcgi.conf;

			set $backend "${APP_UPSTREAM}:9000";

			fastcgi_pass ${APP_FASTCGI_PASS};
		}

		location / {
			try_files $uri $uri/ =404;
		}
	}
}
