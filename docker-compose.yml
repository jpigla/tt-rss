#
# simplified compose FOR LOCAL DEVELOPMENT.
#
# please don't use this in production: it has no database persistence and maps to tt-rss source directly.
#

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${TTRSS_DB_USER}
      - POSTGRES_PASSWORD=${TTRSS_DB_PASS}
      - POSTGRES_DB=${TTRSS_DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TTRSS_DB_USER} -d ${TTRSS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: ghcr.io/tt-rss/tt-rss:latest
    environment:
      SKIP_RSYNC_ON_STARTUP: true
    build:
      dockerfile: .docker/app/Dockerfile
      context: .
      args:
        CI_COMMIT_BRANCH: ${CI_COMMIT_BRANCH:-}
        CI_COMMIT_SHORT_SHA: ${CI_COMMIT_SHORT_SHA:-}
        CI_COMMIT_TIMESTAMP: ${CI_COMMIT_TIMESTAMP:-}
        CI_COMMIT_SHA: ${CI_COMMIT_SHA:-}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html/tt-rss
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy

  updater:
    image: ghcr.io/tt-rss/tt-rss:latest
    build:
      dockerfile: .docker/app/Dockerfile
      context: .
      args:
        CI_COMMIT_BRANCH: ${CI_COMMIT_BRANCH:-}
        CI_COMMIT_SHORT_SHA: ${CI_COMMIT_SHORT_SHA:-}
        CI_COMMIT_TIMESTAMP: ${CI_COMMIT_TIMESTAMP:-}
        CI_COMMIT_SHA: ${CI_COMMIT_SHA:-}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html/tt-rss
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app
    command: /opt/tt-rss/updater.sh

  web-nginx:
    image: ghcr.io/tt-rss/tt-rss-web-nginx:latest
    build:
      dockerfile: .docker/web-nginx/Dockerfile
      context: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${HTTP_PORT}:80
    volumes:
      - .:/var/www/html/tt-rss:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
      - /var/cache/nginx:noexec,nosuid,size=32M
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app

  edge-tts:
    build:
      context: .docker/edge-tts
    environment:
      - REQUIRE_API_KEY=true
      - API_KEY=${EDGE_TTS_API_KEY}
      - DEFAULT_VOICE=de-DE-ConradNeural
      - DEFAULT_LANGUAGE=de-DE
    volumes:
      - ./certs:/custom-certs:ro
    # Port nur intern erreichbar — kein externes Binding nötig.
    # Zugriff über Docker-Netzwerk: http://edge-tts:5050
    expose:
      - "5050"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  db-data: